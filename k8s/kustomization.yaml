# Kustomize entrypoint for the entire Todo app stack.
# Running `kubectl apply -k k8s/` applies every resource listed below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Forces all namespaced resources in this bundle into the same namespace.
namespace: todo-app
resources:
  # Namespace must exist before namespaced resources are created.
  - namespace/todo-namespace.yaml
  # Non-sensitive app settings for backend container.
  - configmaps/backend-configmap.yaml
  # Secret template used by backend and MongoDB.
  - secrets/mongodb-secret.example.yaml
  # Storage primitives used by MongoDB stateful data.
  - volumes/mongodb-pv.yaml
  - volumes/mongodb-pvc.yaml
  # Workloads.
  - deployments/mongodb-deployment.yaml
  - deployments/backend-deployment.yaml
  - deployments/frontend-deployment.yaml
  # Service discovery and internal/external exposure.
  - services/mongodb-service.yaml
  - services/backend-service.yaml
  - services/frontend-service.yaml
  # HTTP entrypoint with host/path routing.
  - ingress/app-ingress.yaml
