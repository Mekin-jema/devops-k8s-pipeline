# Secret template for local/testing use.
# Replace placeholder values before using beyond local development.
apiVersion: v1
kind: Secret
metadata:
  # Referenced by mongodb deployment and backend deployment.
  name: mongodb-secret
  namespace: todo-app
# Opaque is the generic Kubernetes key/value secret type.
type: Opaque
# stringData lets you provide plain strings; Kubernetes stores them as base64-encoded data.
stringData:
  # MongoDB root username consumed by mongo container init process.
  MONGO_ROOT_USERNAME: change_me
  # MongoDB root password consumed by mongo container init process.
  MONGO_ROOT_PASSWORD: change_me
  # Backend connection string to reach MongoDB service from inside the cluster.
  MONGODB_URI: mongodb://change_me:change_me@mongodb-service:27017/todo_app?authSource=admin
