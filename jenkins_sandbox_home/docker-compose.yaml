# Jenkins Sandbox
services:
  jenkins:
    build:
      context: ..
      dockerfile: docker/jenkins.Dockerfile
    image: mekin2024/jenkins-devops-tools:local
    container_name: jenkins_sandbox
    privileged: true
    user: root

    # 🔥 FIX: use host network (critical for kubectl + minikube access)
    network_mode: host

    volumes:
      - ${JENKINS_HOME_PATH}:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube   # 🔥 FIX: ensure kubeconfig is available

  agent:
    image: jenkins/ssh-agent:jdk11
    container_name: jenkins_sandbox_agent
    privileged: true
    user: root

    # 🔥 FIX: same network as Jenkins
    network_mode: host

    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBLIC_KEY}